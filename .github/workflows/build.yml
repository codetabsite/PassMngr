name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Gradle'a izin ver
        run: chmod +x gradlew

      - name: Unit testleri çalıştır
        run: ./gradlew test --stacktrace

      - name: Debug APK üret
        run: ./gradlew assembleDebug --stacktrace

      - name: Debug APK'yı kaydet
        uses: actions/upload-artifact@v4
        with:
          name: passmngr-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # Tag gelince release APK — imzasız, F-Droid kendi imzalar
      - name: Release APK üret (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease --stacktrace

      - name: Release APK'yı kaydet (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: passmngr-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: GitHub Release oluştur (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
